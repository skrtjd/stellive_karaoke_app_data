name: Send notice push

on:
  workflow_dispatch:
    inputs:
      fcm_token:
        description: 'Optional FCM registration token for direct test delivery'
        required: false
        type: string
  push:
    branches:
      - main
    paths:
      - assets/data/notices.json

jobs:
  send-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Send latest notice to FCM topic
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: |
          node <<'NODE'
          const fs = require('fs');

          if (!process.env.FIREBASE_SERVICE_ACCOUNT_JSON) {
            throw new Error('FIREBASE_SERVICE_ACCOUNT_JSON secret is empty or missing.');
          }

          if (!fs.existsSync('assets/data/notices.json')) {
            throw new Error('assets/data/notices.json was not found. Check the repository path.');
          }

          const notices = JSON.parse(fs.readFileSync('assets/data/notices.json', 'utf8'));
          if (!Array.isArray(notices) || notices.length === 0) {
            throw new Error('assets/data/notices.json must be a non-empty JSON array.');
          }

          notices.sort((a, b) => String(b.date).localeCompare(String(a.date)));
          const latest = notices[0];
          const directToken = '${{ github.event.inputs.fcm_token }}'.trim();

          console.log('Latest notice selected:', {
            id: latest.id,
            date: latest.date,
            title: latest.title,
          });

          const serviceAccount = JSON.parse(process.env.FIREBASE_SERVICE_ACCOUNT_JSON);
          if (!serviceAccount.project_id || !serviceAccount.client_email || !serviceAccount.private_key) {
            throw new Error('FIREBASE_SERVICE_ACCOUNT_JSON is not a valid service account JSON.');
          }
          console.log('FCM project:', serviceAccount.project_id);
          console.log('FCM target:', directToken ? 'direct token' : 'topic notices');

          const now = Math.floor(Date.now() / 1000);
          const header = Buffer.from(JSON.stringify({ alg: 'RS256', typ: 'JWT' })).toString('base64url');
          const claim = Buffer.from(JSON.stringify({
            iss: serviceAccount.client_email,
            scope: 'https://www.googleapis.com/auth/firebase.messaging',
            aud: 'https://oauth2.googleapis.com/token',
            iat: now,
            exp: now + 3600,
          })).toString('base64url');

          const crypto = require('crypto');
          const signature = crypto
            .createSign('RSA-SHA256')
            .update(`${header}.${claim}`)
            .sign(serviceAccount.private_key, 'base64url');
          const assertion = `${header}.${claim}.${signature}`;

          async function main() {
            const tokenResponse = await fetch('https://oauth2.googleapis.com/token', {
              method: 'POST',
              headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
              body: new URLSearchParams({
                grant_type: 'urn:ietf:params:oauth:grant-type:jwt-bearer',
                assertion,
              }),
            });
            const tokenJson = await tokenResponse.json();
            if (!tokenResponse.ok) throw new Error(JSON.stringify(tokenJson));

            const response = await fetch(
              `https://fcm.googleapis.com/v1/projects/${serviceAccount.project_id}/messages:send`,
              {
                method: 'POST',
                headers: {
                  Authorization: `Bearer ${tokenJson.access_token}`,
                  'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                  message: {
                    ...(directToken ? { token: directToken } : { topic: 'notices' }),
                    notification: {
                      title: latest.title || '새 공지사항',
                      body: latest.body || latest.content || '',
                    },
                    data: {
                      noticeId: String(latest.id || ''),
                      noticeDate: String(latest.date || ''),
                      title: String(latest.title || '새 공지사항'),
                      body: String(latest.body || latest.content || ''),
                    },
                    android: {
                      priority: 'HIGH',
                      notification: {
                        channel_id: 'new_notices',
                        sound: 'default',
                      },
                    },
                  },
                }),
              },
            );

            const result = await response.text();
            if (!response.ok) throw new Error(result);
            console.log('FCM response:', result);
          }

          main().catch((error) => {
            console.error(error);
            process.exit(1);
          });
          NODE
