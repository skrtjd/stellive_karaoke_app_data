<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>스텔라이브 노래방 정보</title>
    <style>
        /* (이전 스타일 시트 동일 - 생략) */
        :root { --bg-color: #121212; --card-bg: #1e1e1e; --text-color: #e0e0e0; --accent-color: #bb86fc; --border-color: #333; }
        body { font-family: sans-serif; background: var(--bg-color); color: var(--text-color); margin: 0; }
        nav { background: #000; padding: 15px; border-bottom: 1px solid var(--border-color); position: sticky; top: 0; }
        .nav-links a { color: #888; margin-right: 15px; cursor: pointer; text-decoration: none; }
        .nav-links a:hover { color: #fff; }
        .container { max-width: 900px; margin: 20px auto; padding: 0 15px; }
        .song-item { background: var(--card-bg); margin-bottom: 10px; padding: 15px; border-radius: 8px; border-left: 4px solid var(--accent-color); }
        table { width: 100%; border-collapse: collapse; background: var(--card-bg); margin-top: 10px; }
        th, td { border: 1px solid var(--border-color); padding: 10px; text-align: center; font-size: 0.9rem; }
        .hidden { display: none; }
    </style>
</head>
<body>

<nav>
    <h1 onclick="location.reload()">스텔라이브 노래방 정보</h1>
    <div class="nav-links" id="member-nav">
        <a onclick="loadMainPage()">홈(공지)</a>
        </div>
</nav>

<div class="container">
    <div id="page-main">
        <h2>📢 최근 공지사항</h2>
        <div id="notice-list">로딩 중...</div>
    </div>

    <div id="page-member" class="hidden">
        <h2 id="member-title">멤버 이름</h2>
        <div id="member-data-content">데이터를 가져오는 중...</div>
    </div>
</div>

<script>
    // 1. 설정: 본인의 데이터 경로에 맞게 수정
    const BASE_URL = "./assets/data/"; // index.html과 같은 저장소에 있을 때
    const MEMBERS = ["아이리 칸나", "아야츠노 유니", "아카네 리제", "네네코 마시로", "아라하시 타비", "시라유키 히나"];

    // 페이지 로드 시 실행
    window.onload = () => {
        createNav();
        loadMainPage();
    };

    // 네비게이션 바 생성
    function createNav() {
        const nav = document.getElementById('member-nav');
        MEMBERS.forEach(name => {
            const a = document.createElement('a');
            a.innerText = name.split(' ')[1] || name; // 이름만 표시 (예: 칸나)
            a.onclick = () => loadMemberPage(name);
            nav.appendChild(a);
        });
    }

    // 메인 공지사항 데이터 가져오기 (notices.json 사용)
    async function loadMainPage() {
        showPage('main');
        const listDiv = document.getElementById('notice-list');
        
        try {
            const response = await fetch(BASE_URL + 'notices.json');
            const data = await response.json();
            
            listDiv.innerHTML = data.map(n => `
                <div class="song-item">
                    <div style="font-size:0.8rem; color:#888;">${n.date}</div>
                    <div style="font-weight:bold; font-size:1.1rem; margin:5px 0;">${n.title}</div>
                    <div>${n.body || n.content}</div>
                </div>
            `).join('');
        } catch (e) {
            listDiv.innerText = "공지사항을 불러오지 못했습니다.";
        }
    }

    // 멤버별 곡 데이터 가져오기 (각 멤버명.json이 있다고 가정)
    async function loadMemberPage(memberName) {
        showPage('member');
        document.getElementById('member-title').innerText = memberName;
        const contentDiv = document.getElementById('member-data-content');
        
        try {
            // 예: assets/data/아이리 칸나.json 파일을 가져옴
            const response = await fetch(`${BASE_URL}${memberName}.json`);
            const songs = await response.json();
            
            let html = `<table><thead><tr><th>TJ</th><th>KY</th><th>곡명</th><th>공개일</th></tr></thead><tbody>`;
            html += songs.map(s => `
                <tr>
                    <td style="color:#ff5252">${s.tj || 'x'}</td>
                    <td style="color:#4caf50">${s.ky || 'x'}</td>
                    <td>${s.title}</td>
                    <td>${s.date || '-'}</td>
                </tr>
            `).join('');
            html += `</tbody></table>`;
            
            contentDiv.innerHTML = html;
        } catch (e) {
            contentDiv.innerText = `${memberName}의 데이터를 찾을 수 없습니다. (${memberName}.json 파일 확인 필요)`;
        }
    }

    function showPage(pageId) {
        document.getElementById('page-main').className = pageId === 'main' ? '' : 'hidden';
        document.getElementById('page-member').className = pageId === 'member' ? '' : 'hidden';
    }
</script>

</body>
</html>
