<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>스텔라이브 노래방 번호 사이트</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-color: #e0e0e0;
            --accent-color: #bb86fc;
            --border-color: #333;
            --tj-color: #ff5252;
            --ky-color: #4caf50;
        }

        body {
            font-family: 'Pretendard', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }

        /* 네비게이션 */
        nav {
            background-color: #000;
            padding: 15px 20px;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid var(--border-color);
        }

        nav h1 {
            margin: 0 0 10px 0;
            font-size: 1.2rem;
            color: #fff;
        }

        .nav-links {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .nav-links a {
            color: #aaa;
            text-decoration: none;
            font-size: 0.9rem;
            cursor: pointer;
        }

        .nav-links a:hover, .nav-links a.active {
            color: #fff;
            font-weight: bold;
        }

        /* 컨테이너 */
        .container {
            max-width: 900px;
            margin: 20px auto;
            padding: 0 15px;
        }

        .update-info {
            font-size: 0.85rem;
            color: #888;
            margin-bottom: 20px;
        }

        /* 카드 스타일 (메인화면 월별 목록) */
        .month-section {
            margin-bottom: 10px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            overflow: hidden;
        }

        .month-header {
            background-color: var(--card-bg);
            padding: 12px 20px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            font-weight: bold;
        }

        .song-item {
            background-color: #252525;
            margin: 10px;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid var(--accent-color);
        }

        .song-date { font-size: 0.8rem; color: #888; }
        .song-title { font-weight: bold; margin: 5px 0; }
        .song-nums { font-size: 0.85rem; color: #bbb; }

        /* 테이블 스타일 (멤버별 목록) */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            background-color: var(--card-bg);
            font-size: 0.85rem;
        }

        th, td {
            border: 1px solid var(--border-color);
            padding: 10px;
            text-align: center;
        }

        th { background-color: #2c2c2c; color: #fff; }
        .tj-num { color: var(--tj-color); }
        .ky-num { color: var(--ky-color); }

        .section-title {
            margin: 30px 0 10px 0;
            border-left: 4px solid var(--accent-color);
            padding-left: 10px;
        }

        .hidden { display: none; }
    </style>
</head>
<body>

<nav>
    <h1 onclick="showPage('main')">스텔라이브 노래방 번호 사이트</h1>
    <div class="nav-links">
        <a onclick="showPage('main')" class="active">홈</a>
        <a onclick="showMember('시로')">시로</a>
        <a onclick="showMember('칸나')">칸나</a>
        <a onclick="showMember('유니')">유니</a>
        <a onclick="showMember('타비')">타비</a>
        <a>리코</a><a>린</a><a>나나</a> </div>
</nav>

<div class="container">
    <div id="page-main">
        <div class="update-info">Recent Update 2026.04.21.11:30</div>
        
        <div class="month-section">
            <div class="month-header">▼ 2026년 4월</div>
            <div class="month-content">
                <div class="song-item">
                    <div class="song-date">🗓 2026.04.21</div>
                    <div class="song-title">유니, 리코 - 커버곡 - 美少女無罪♡パイレーツ</div>
                    <div class="song-nums">📌 TJ: 52490</div>
                </div>
                <div class="song-item">
                    <div class="song-date">🗓 2026.04.19</div>
                    <div class="song-title">리제 - 커버곡 - orion</div>
                    <div class="song-nums">📌 TJ: 28660 | KY: 44128</div>
                </div>
            </div>
        </div>
        </div>

    <div id="page-member" class="hidden">
        <h2 id="member-name-title" class="section-title">멤버 이름</h2>
        
        <h3>▼ 오리지널곡</h3>
        <table>
            <thead>
                <tr><th>TJ</th><th>KY</th><th>곡명</th><th>공개일</th></tr>
            </thead>
            <tbody id="original-list">
                </tbody>
        </table>

        <h3>▼ 커버곡</h3>
        <table>
            <thead>
                <tr><th>TJ</th><th>KY</th><th>곡명</th><th>비고</th><th>공개일</th></tr>
            </thead>
            <tbody id="cover-list">
                </tbody>
        </table>
    </div>
</div>

<script>
    function showPage(pageId) {
        document.getElementById('page-main').classList.add('hidden');
        document.getElementById('page-member').classList.add('hidden');
        document.getElementById('page-' + pageId).classList.remove('hidden');
        
        // 메뉴 활성화 표시
        document.querySelectorAll('.nav-links a').forEach(a => a.classList.remove('active'));
        if(pageId === 'main') document.querySelector('.nav-links a:first-child').classList.add('active');
    }

    function showMember(name) {
        showPage('member');
        document.getElementById('member-name-title').innerText = name;
        
        // 시로 데이터 예시 (이미지 d657d3 참고)
        if(name === '시로') {
            const originalHtml = `<tr><td>x</td><td>x</td><td>봄꿈</td><td>24.10.16.</td></tr>`;
            const coverHtml = `
                <tr><td class="tj-num">68096</td><td>x</td><td>댄스 로봇 댄스</td><td>-</td><td>24.07.05.</td></tr>
                <tr><td class="tj-num">16256</td><td class="ky-num">45651</td><td>연예인</td><td>-</td><td>25.02.22.</td></tr>
                <tr><td>x</td><td>x</td><td>슈가로스</td><td>-</td><td>2025.04.11.</td></tr>
            `;
            document.getElementById('original-list').innerHTML = originalHtml;
            document.getElementById('cover-list').innerHTML = coverHtml;
        } else {
            document.getElementById('original-list').innerHTML = '<tr><td colspan="4">데이터 준비 중...</td></tr>';
            document.getElementById('cover-list').innerHTML = '<tr><td colspan="5">데이터 준비 중...</td></tr>';
        }
    }
</script>

</body>
</html>
